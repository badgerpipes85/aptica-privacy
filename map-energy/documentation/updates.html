<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Updates – MAP Energy</title>

  <style>
    :root{
      --bg:#0d1117;
      --card:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.08);
      --text:#f3f6fb;
      --muted:#a9b4c2;
      --blue:#2f80ed;
      --green:#27ae60;
      --yellow:#f2c94c;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:40px 20px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .shell{
      max-width:900px;
      margin:0 auto;
    }

    .hero{
      margin-bottom:30px;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(2.2rem,5vw,3rem);
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .update-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px;
      margin-bottom:20px;
    }

    .version-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .version{
      font-size:1.6rem;
      font-weight:700;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 12px;
      border-radius:999px;
      font-size:0.85rem;
      font-weight:600;
    }

    .badge-blue{
      background:rgba(47,128,237,0.15);
      color:var(--blue);
    }

    .badge-green{
      background:rgba(39,174,96,0.15);
      color:var(--green);
    }

    .badge-yellow{
      background:rgba(242,201,76,0.15);
      color:var(--yellow);
    }

    ul{
      margin:0;
      padding-left:20px;
    }

    li{
      margin:10px 0;
      color:var(--muted);
      line-height:1.5;
    }

    a{
      color:var(--blue);
      text-decoration:none;
    }

    .footer{
      margin-top:30px;
      text-align:center;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="shell">

    <div class="hero">
      <h1>MAP Energy Updates</h1>

      <p>
        Release notes and feature updates for MAP Energy.
      </p>
    </div>

    <div class="update-card">
      <div class="version-row">
        <div class="version">1.5.0</div>
        <span class="badge badge-green">Latest</span>
      </div>

      <ul>
        <li>To be populated</li>
      </ul>
    </div>

    <div class="update-card">
      <div class="version-row">
        <div class="version">1.4.1</div>
        <span class="badge badge-blue">Patch Update</span>
      </div>

      <ul>
        <li>To be populated</li>
      </ul>
    </div>

    <div class="update-card">
      <div class="version-row">
        <div class="version">1.4.0</div>
        <span class="badge badge-yellow">Feature Update</span>
      </div>

      <ul>
        <li>To be populated</li>
      </ul>
    </div>

    <div class="update-card">
      <div class="version-row">
        <div class="version">1.3.0</div>
        <span class="badge badge-blue">Release</span>
      </div>

      <ul>
        <li>Initial public MAP Energy release</li>
      </ul>
    </div>

    <div class="footer">
      <p>
        <a href="/map-energy/documentation/">← Back to Documentation</a>
      </p>

      <p>
        © <span id="year"></span> Aptica Ltd
      </p>
    </div>

  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
